// ── Domain colours ────────────────────────────────────────────
const DOMAIN_COLOURS = [
  '#6B4FBB','#0BBFBF','#E8453C','#F0B429',
  '#22C55E','#EC4899','#F97316','#3B82F6',
  '#A855F7','#14B8A6','#F43F5E','#84CC16'
];

function genId(prefix) {
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

// Returns a colour string for a given depth, derived from the root domain colour
// Depth 0: full colour (border + stroke, vibrant)
// Depth 1: mixed ~30% toward dark bg — still clearly related
// Depth 2: mixed ~55% toward dark bg
// Depth 3+: mixed ~70% toward dark bg
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}
function mixColour(hex, depth) {
  if (depth === 0) return hex;
  const bg = [13, 10, 26]; // --bg dark
  const [r, g, b] = hexToRgb(hex);
  // Mix toward a mid-purple rather than pure black — preserves hue family while clearly stepping down
  const mid = [45, 38, 80]; // mid-purple reference point
  const factors = [0, 0.52, 0.72, 0.83, 0.90];
  const t = factors[Math.min(depth, factors.length - 1)];
  const mr = Math.round(r + (mid[0] - r) * t);
  const mg = Math.round(g + (mid[1] - g) * t);
  const mb = Math.round(b + (mid[2] - b) * t);
  return `rgb(${mr},${mg},${mb})`;
}

// ── Tree node structure ───────────────────────────────────────
// Each node: { id, label, done, children[], colour(root only) }
// Blueprint: { id, title, clarificationAnswers, nodes[], createdAt, updatedAt }

function migrateBlueprint(bp) {
  // If already has nodes[], it's already migrated
  if (bp.nodes) return bp;
  // Migrate from old domains/actions structure
  const nodes = (bp.domains || []).map((d, di) => ({
    id: d.id || genId('n'),
    label: d.name || 'Domain',
    done: false,
    colour: DOMAIN_COLOURS[di % DOMAIN_COLOURS.length],
    children: (d.actions || []).map(a => ({
      id: a.id || genId('n'),
      label: a.text || '',
      done: a.done || false,
      children: []
    }))
  }));
  return { ...bp, nodes, domains: undefined };
}

// ── Tree helpers ──────────────────────────────────────────────
function updateNodeInTree(nodes, targetId, updater) {
  return nodes.map(n => {
    if (n.id === targetId) return updater(n);
    if (n.children && n.children.length)
      return { ...n, children: updateNodeInTree(n.children, targetId, updater) };
    return n;
  });
}

function deleteNodeInTree(nodes, targetId) {
  return nodes
    .filter(n => n.id !== targetId)
    .map(n => n.children && n.children.length
      ? { ...n, children: deleteNodeInTree(n.children, targetId) }
      : n
    );
}

function addChildToNode(nodes, parentId, child) {
  return nodes.map(n => {
    if (n.id === parentId) return { ...n, children: [...(n.children || []), child] };
    if (n.children && n.children.length)
      return { ...n, children: addChildToNode(n.children, parentId, child) };
    return n;
  });
}

function countDescendants(node) {
  if (!node.children || !node.children.length) return 0;
  return node.children.length + node.children.reduce((s, c) => s + countDescendants(c), 0);
}

function countDone(node) {
  const self = node.done ? 1 : 0;
  if (!node.children || !node.children.length) return self;
  return self + node.children.reduce((s, c) => s + countDone(c), 0);
}

// Returns 0-1 completion ratio for a node, recursively from leaf nodes up
function nodeProgress(node) {
  if (!node.children || node.children.length === 0) {
    return node.done ? 1 : 0;
  }
  const total = node.children.length;
  const sum = node.children.reduce((s, c) => s + nodeProgress(c), 0);
  return sum / total;
}

// Does this node have any descendants (direct or indirect)?
function hasAnyChildren(node) {
  return node.children && node.children.length > 0;
}

// ── Canvas map ────────────────────────────────────────────────
function BlueprintCanvas({ blueprint, onUpdateBlueprint }) {
  const canvasRef = React.useRef(null);
  const [dims, setDims] = React.useState({ w: 800, h: 600 });
  const [transform, setTransform] = React.useState({ x: 0, y: 0, scale: 1 });
  const [ready, setReady] = React.useState(false);
  const [animPhase, setAnimPhase] = React.useState(0); // 0=hidden,1=expanding,2=settled
  const [expandedId, setExpandedId] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);
  const [addingTo, setAddingTo] = React.useState(null); // nodeId we're adding child to
  const [newLabel, setNewLabel] = React.useState('');
  const [pushStage, setPushStage] = React.useState(null);
  const [pushNodeId, setPushNodeId] = React.useState(null);
  const [pushFeedback, setPushFeedback] = React.useState(null);
  const [pushTargetTabId, setPushTargetTabId] = React.useState(null);
  const [pushTargetFolderId, setPushTargetFolderId] = React.useState(null);
  const [pendingPushType, setPendingPushType] = React.useState(null);
  const [addingRoot, setAddingRoot] = React.useState(false);
  const [rootLabel, setRootLabel] = React.useState('');
  const [showWhy, setShowWhy] = React.useState(false);
  const [editingField, setEditingField] = React.useState(null);
  const [editingValue, setEditingValue] = React.useState('');
  const [renamingId, setRenamingId] = React.useState(null);
  const [renameValue, setRenameValue] = React.useState('');
  const [renamingRoot, setRenamingRoot] = React.useState(false);
  const [renameRootValue, setRenameRootValue] = React.useState('');
  const [holdTimer, setHoldTimer] = React.useState(null);
  const [holdNodeId, setHoldNodeId] = React.useState(null);
  const [holdProgress, setHoldProgress] = React.useState(0);
  const holdInterval = React.useRef(null);
  const pointerDownTime = React.useRef(0);
  const pointerDownNodeId = React.useRef(null);
  const addingToActive = React.useRef(false);
  const addingRootActive = React.useRef(false);
  const rootDownTime = React.useRef(0);
  const rootHoldFired = React.useRef(false);
  const rootDelayTimer = React.useRef(null);
  const isPanning = React.useRef(false);
  const panStart = React.useRef({ x: 0, y: 0, tx: 0, ty: 0 });
  const didPan = React.useRef(false);

  const nodes = blueprint.nodes || [];

  React.useEffect(() => {
    function measure() {
      if (canvasRef.current) {
        const r = canvasRef.current.getBoundingClientRect();
        setDims({ w: r.width, h: r.height });
      }
    }
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, []);

  // Register wheel as non-passive so we can preventDefault on pinch
  React.useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    const onWheel = (e) => { e.preventDefault(); };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, []);

  // Entry animation sequence
  React.useEffect(() => {
    if (dims.w < 100) return;
    const t1 = setTimeout(() => setAnimPhase(1), 80);
    const t2 = setTimeout(() => setAnimPhase(2), 900);
    setReady(true);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [dims.w]);

  // Zoom on scroll/pinch — cursor-centred, gradual
  function handleWheel(e) {
    e.preventDefault();
    e.stopPropagation();
    const isPinch = e.ctrlKey || e.metaKey;
    let factor;
    if (isPinch) {
      const clamped = Math.max(-5, Math.min(5, e.deltaY));
      factor = 1 - clamped * 0.012;
    } else {
      factor = e.deltaY > 0 ? 0.96 : 1.04;
    }
    // Cursor position relative to the canvas element
    const rect = canvasRef.current ? canvasRef.current.getBoundingClientRect() : { left: 0, top: 0 };
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    setTransform(t => {
      const newScale = Math.max(0.25, Math.min(4, t.scale * factor));
      const actualFactor = newScale / t.scale;
      return {
        scale: newScale,
        x: mx - (mx - t.x) * actualFactor,
        y: my - (my - t.y) * actualFactor,
      };
    });
  }

  // Pan
  function handleMouseDown(e) {
    if (e.button !== 0) return;
    pointerDownTime.current = Date.now(); // always record time, even for background clicks
    isPanning.current = true;
    didPan.current = false;
    panStart.current = { x: e.clientX, y: e.clientY, tx: transform.x, ty: transform.y };
  }

  function handleMouseMove(e) {
    if (!isPanning.current) return;
    const dx = e.clientX - panStart.current.x;
    const dy = e.clientY - panStart.current.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didPan.current = true;
    setTransform(t => ({ ...t, x: panStart.current.tx + dx, y: panStart.current.ty + dy }));
  }

  function handleMouseUp() { isPanning.current = false; }

  // Node layout — recursive radial positioning
  // parentCx/parentCy = the origin point children fan AWAY from
  function layoutNodes(nodeList, cx, cy, orbitRadius, startAngle, angleSpan, depth, parentCx, parentCy) {
    const pCx = parentCx !== undefined ? parentCx : cx;
    const pCy = parentCy !== undefined ? parentCy : cy;
    return nodeList.map((node, i) => {
      const angle = nodeList.length === 1
        ? startAngle
        : startAngle + (i / (nodeList.length - 1) - 0.5) * angleSpan;
      const x = cx + Math.cos(angle) * orbitRadius;
      const y = cy + Math.sin(angle) * orbitRadius;
      // childAngle = direction FROM parent centre TOWARD this node (away from origin)
      const childAngle = Math.atan2(y - pCy, x - pCx);
      const childCount = (node.children || []).length;
      const childRadius = Math.max(60, orbitRadius * 0.68);
      const childSpan = Math.min(Math.PI * 0.6, Math.PI * 0.18 * Math.max(1, childCount));
      return {
        ...node,
        x, y, angle, depth,
        colour: node.colour || (depth === 0 ? DOMAIN_COLOURS[i % DOMAIN_COLOURS.length] : null),
        children: layoutNodes(
          node.children || [],
          x, y, childRadius, childAngle, childSpan, depth + 1,
          pCx, pCy  // pass original centre so all descendants fan away from map centre
        )
      };
    });
  }

  // Flatten laid-out tree for rendering
  function flattenTree(layouted, parentId = null, rootColour = null, depth = 0) {
    let out = [];
    for (const n of layouted) {
      const baseCol = n.colour || rootColour; // root domain colour
      const displayCol = mixColour(baseCol, depth); // depth-adjusted colour
      out.push({ ...n, colour: baseCol, displayColour: displayCol, depth, parentId, children: undefined });
      if (n.children && n.children.length)
        out = out.concat(flattenTree(n.children, n.id, baseCol, depth + 1));
    }
    return out;
  }

  function flattenEdges(layouted, parentNode = null, rootColour = null, depth = 0) {
    let edges = [];
    for (const n of layouted) {
      const baseCol = n.colour || rootColour;
      const edgeCol = mixColour(baseCol, depth);
      if (parentNode) edges.push({ x1: parentNode.x, y1: parentNode.y, x2: n.x, y2: n.y, col: edgeCol, depth });
      if (n.children && n.children.length)
        edges = edges.concat(flattenEdges(n.children, n, baseCol, depth + 1));
    }
    return edges;
  }

  const cx = dims.w / 2;
  const cy = dims.h / 2;
  // Larger base orbit so nodes have breathing room before repulsion
  const rootOrbit = Math.min(dims.w, dims.h) * 0.34;
  const fullSpan = Math.PI * 2;
  const rootStartAngle = nodes.length === 1 ? 0 : -Math.PI / 2;

  const laid = layoutNodes(nodes, cx, cy, rootOrbit, rootStartAngle, fullSpan, 0, cx, cy);
  let flatNodes = flattenTree(laid);
  const flatEdges = flattenEdges(laid);

  // ── Repulsion pass — push overlapping nodes apart ──────────
  // Run multiple iterations until stable or max reached
  // Each node has a radius; minimum gap between any two node edges = MIN_GAP
  const MIN_GAP = 14; // px between circle edges
  const MAX_ITER = 80;
  const DAMPING = 0.5;

  // Build a mutable positions map keyed by node id
  const positions = {};
  flatNodes.forEach(n => { positions[n.id] = { x: n.x, y: n.y }; });

  for (let iter = 0; iter < MAX_ITER; iter++) {
    let maxMove = 0;
    for (let i = 0; i < flatNodes.length; i++) {
      for (let j = i + 1; j < flatNodes.length; j++) {
        const a = flatNodes[i];
        const b = flatNodes[j];
        const pa = positions[a.id];
        const pb = positions[b.id];
        const rA = nodeRadius(a.label, a.depth);
        const rB = nodeRadius(b.label, b.depth);
        const minDist = rA + rB + MIN_GAP;
        const dx = pb.x - pa.x;
        const dy = pb.y - pa.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
        if (dist < minDist) {
          const overlap = (minDist - dist) * DAMPING;
          const nx = dx / dist;
          const ny = dy / dist;
          // Push both nodes apart equally, but anchor depth-0 nodes more strongly
          // (children move more, parents move less)
          const wA = a.depth === 0 ? 0.3 : 0.5;
          const wB = b.depth === 0 ? 0.3 : 0.5;
          pa.x -= nx * overlap * wA;
          pa.y -= ny * overlap * wA;
          pb.x += nx * overlap * wB;
          pb.y += ny * overlap * wB;
          maxMove = Math.max(maxMove, overlap);
        }
      }
    }
    if (maxMove < 0.5) break; // converged
  }

  // Apply repulsed positions back to flatNodes
  flatNodes = flatNodes.map(n => ({ ...n, x: positions[n.id].x, y: positions[n.id].y }));

  // Central node radius from title
  function measureTextW(text, fs, fw) { return text.length * fs * (fw >= 800 ? 0.62 : 0.56); }
  const titleWords = (blueprint.title || '').toUpperCase().split(' ');
  let tLine = '', tLines = [];
  titleWords.forEach(w => {
    const c = tLine ? tLine + ' ' + w : w;
    if (c.length > 14) { if (tLine) tLines.push(tLine); tLine = w; } else tLine = c;
  });
  if (tLine) tLines.push(tLine);
  tLines = tLines.slice(0, 3);
  const longest = tLines.reduce((a, b) => a.length > b.length ? a : b, '');
  const crByWidth = measureTextW(longest, 12, 900) / 2 + 22;
  const crByHeight = (tLines.length * 18) / 2 + 22; // 18px line height per line
  const CR = Math.max(50, Math.max(crByWidth, crByHeight));

  // Node radius from label
  function nodeRadius(label, depth) {
    const fs = depth === 0 ? 10 : depth === 1 ? 8.5 : 7.5;
    const fw = 800;
    const upper = (label || '').toUpperCase();
    // Use splitLabel to get the same lines as rendering
    const lines = splitLabel(label);
    const longestLine = lines.reduce((a, b) => a.length >= b.length ? a : b, '');
    const textW = measureTextW(longestLine, fs, fw);
    const pad = depth === 0 ? 18 : 12;
    const minR = depth === 0 ? 38 : depth === 1 ? 24 : 18;
    return Math.max(minR, textW / 2 + pad);
  }

  // Split label to lines for a given maxChars
  function splitLabel(label) {
    const upper = (label || '').toUpperCase();
    const words = upper.split(' ');
    // Single short word — no split needed
    if (words.length === 1 && upper.length <= 11) return [upper];
    // Multi-word — find most balanced split
    if (words.length >= 2) {
      let bestSplit = 1, bestDiff = Infinity;
      for (let i = 1; i < words.length; i++) {
        const l1 = words.slice(0, i).join(' ');
        const l2 = words.slice(i).join(' ');
        const diff = Math.abs(l1.length - l2.length);
        if (diff < bestDiff) { bestDiff = diff; bestSplit = i; }
      }
      return [words.slice(0, bestSplit).join(' '), words.slice(bestSplit).join(' ')].slice(0, 2);
    }
    // Single long word — split at midpoint for balance
    const mid = Math.ceil(upper.length / 2);
    return [upper.slice(0, mid), upper.slice(mid)];
  }

  // Animation progress: phase 0 = all at centre, phase 2 = settled
  function getNodePos(n) {
    if (animPhase === 0) return { x: cx, y: cy, opacity: 0, r: 0 };
    if (animPhase === 2) return { x: n.x, y: n.y, opacity: 1, r: nodeRadius(n.label, n.depth) };
    // phase 1 = expanding
    return { x: n.x, y: n.y, opacity: 0.7, r: nodeRadius(n.label, n.depth) };
  }

  // Hold-to-branch logic — purely time based, no race conditions
  const HOLD_MS = 600; // ms to trigger branch mode

  function startHold(nodeId) {
    pointerDownTime.current = Date.now();
    pointerDownNodeId.current = nodeId;
    setHoldNodeId(nodeId);
    setHoldProgress(0);
    let prog = 0;
    holdInterval.current = setInterval(() => {
      const elapsed = Date.now() - pointerDownTime.current;
      prog = Math.min(100, (elapsed / HOLD_MS) * 100);
      setHoldProgress(prog);
      if (prog >= 100) {
        clearInterval(holdInterval.current);
        holdInterval.current = null;
        addingToActive.current = true;
        setHoldNodeId(null);
        setHoldProgress(0);
        setAddingTo(nodeId);
        setNewLabel('');
      }
    }, 16);
  }

  function cancelHold() {
    if (holdInterval.current) {
      clearInterval(holdInterval.current);
      holdInterval.current = null;
    }
    setHoldNodeId(null);
    setHoldProgress(0);
  }

  function handleNodePointerDown(e, nodeId) {
    e.stopPropagation();
    if (didPan.current) return;
    startHold(nodeId);
  }

  async function handleNodePointerUp(e, node) {
    e.stopPropagation();
    // If branch input is already open, ignore
    if (addingToActive.current) return;
    const elapsed = Date.now() - pointerDownTime.current;
    cancelHold();
    if (elapsed >= HOLD_MS) return; // was a hold, not a click
    if (didPan.current) return;
    // Short press = click
    if (node.depth === 0) {
      // depth-0: expand/collapse if has children, otherwise toggle done
      const hasKids = flatNodes.some(fn => fn.parentId === node.id);
      if (hasKids) {
        setExpandedId(prev => prev === node.id ? null : node.id);
      } else {
        const updated = { ...blueprint, nodes: updateNodeInTree(blueprint.nodes, node.id, n => ({ ...n, done: !n.done })), updatedAt: new Date().toISOString() };
        await onUpdateBlueprint(updated);
      }
    } else {
      // deeper nodes: only toggle if leaf (no children) — parents fill from children
      const hasKids = flatNodes.some(fn => fn.parentId === node.id);
      if (!hasKids) {
        const updated = { ...blueprint, nodes: updateNodeInTree(blueprint.nodes, node.id, n => ({ ...n, done: !n.done })), updatedAt: new Date().toISOString() };
        await onUpdateBlueprint(updated);
      }
      // If has children, clicking still expands — do nothing extra
    }
  }

  // ── Push to Focus Engine helpers ──────────────────────────
  // ── Focus Engine data helpers ────────────────────────────────
  function getFEData() {
    try {
      return {
        horizon: JSON.parse(localStorage.getItem('tapl-horizon') || '[]'),
        folders: JSON.parse(localStorage.getItem('tapl-hz-folders') || '[]'),
        tabs:    JSON.parse(localStorage.getItem('tapl-hz-tabs')    || '[]'),
      };
    } catch(e) { return { horizon: [], folders: [], tabs: [] }; }
  }

  function saveFEData({ horizon, folders, tabs }) {
    localStorage.setItem('tapl-horizon',    JSON.stringify(horizon));
    localStorage.setItem('tapl-hz-folders', JSON.stringify(folders));
    localStorage.setItem('tapl-hz-tabs',    JSON.stringify(tabs));
    window.dispatchEvent(new CustomEvent('tapl-fe-sync'));
  }

  function makeId(prefix) {
    return prefix + Date.now() + (prefix === 'hz_' ? '_' + Math.random().toString(36).slice(2,7) : '');
  }

  function findTreeNode(nodes, id) {
    for (const n of nodes) {
      if (n.id === id) return n;
      if (n.children && n.children.length) {
        const found = findTreeNode(n.children, id);
        if (found) return found;
      }
    }
    return null;
  }

  // Recursively collect all descendant labels depth-first, with optional prefix context
  function collectDescendants(node, prefix) {
    const results = [];
    (node.children || []).forEach(c => {
      const label = prefix ? `${prefix} › ${c.label}` : c.label;
      results.push(label);
      collectDescendants(c, label).forEach(l => results.push(l));
    });
    return results;
  }

  // Max depth of a subtree (0 = no children)
  function subtreeDepth(node) {
    if (!node.children || !node.children.length) return 0;
    return 1 + Math.max(...node.children.map(subtreeDepth));
  }

  function makeChunk(label, index) {
    return { id: `chunk_${Date.now()}_${index}`, name: label, done: false };
  }

  function makeHorizonItem(name, type, folderId, chunks) {
    return {
      id: makeId('hz_'), type, name,
      dueDate: '', triggerDate: '',
      chunks: chunks || [],
      completed: false, repeat: 'none', pulseFreq: 'medium',
      needsCarryForward: false, lastCompletedAt: null,
      folderId: folderId || null,
      notes: `From Blueprint: ${blueprint.title}`,
      createdAt: new Date().toISOString(),
      lastReviewed: new Date().toISOString(),
      dateConfirmed: true, size: 'S', autoRefresh: true,
      promoted: false
    };
  }

  function makeFolder(name, colour, tabId, sortOrder) {
    return {
      id: makeId('folder_'), name,
      color: colour || '#6B4FBB',
      collapsed: false,
      sortOrder: sortOrder || 0,
      tabId: tabId || null
    };
  }

  function makeTab(name, colour) {
    return { id: `tab_${Date.now()}`, name, color: colour || '#6B4FBB' };
  }

  // ── Warning detection ────────────────────────────────────────
  function pushWarning(treeNode, type) {
    const depth = subtreeDepth(treeNode);
    if (type === 'tab'     && depth > 4) return 'This node has more than 4 levels. Items deeper than Tab → Folder → Project → Step will be added as extra steps on their nearest project.';
    if (type === 'folder'  && depth > 3) return 'This node has more than 3 levels. Items deeper than Folder → Project → Step will be added as extra steps on their nearest project.';
    if (type === 'project' && depth > 1) return 'Nested items will all appear as steps within this project.';
    return null;
  }

  // ── Tab/folder resolution ────────────────────────────────────
  // Returns { tab, fe } — finds or creates the Blueprint tab
  function resolveOrCreateBlueprintTab(fe) {
    let tab = fe.tabs.find(t => t.name === 'Blueprint');
    if (!tab) {
      tab = makeTab('Blueprint', '#6B4FBB');
      fe.tabs = [...fe.tabs, tab];
    }
    return { tab, fe };
  }

  // Returns { folder, fe } — finds or creates a "Blueprint" folder inside a tab
  function resolveOrCreateBlueprintFolder(fe, tabId, colour) {
    let folder = fe.folders.find(f => f.tabId === tabId && f.name === 'Blueprint');
    if (!folder) {
      folder = makeFolder('Blueprint', colour || '#6B4FBB', tabId, fe.folders.length);
      fe.folders = [...fe.folders, folder];
    }
    return { folder, fe };
  }

  // ── Push functions ───────────────────────────────────────────
  function pushAsLaunch(nodeId) {
    const node = flatNodes.find(n => n.id === nodeId);
    if (!node) return;
    // Launch = ungrouped task — goes into Blueprint tab > Blueprint folder
    let fe = getFEData();
    const { tab } = resolveOrCreateBlueprintTab(fe);
    const { folder } = resolveOrCreateBlueprintFolder(fe, tab.id, node.colour);
    fe.horizon = [...fe.horizon, makeHorizonItem(node.label, 'task', folder.id)];
    saveFEData(fe);
    setPushFeedback('Launched in Focus Engine');
    setTimeout(() => { setPushFeedback(null); setPushStage(null); setPushNodeId(null); }, 1800);
  }

  // Called after folder destination is resolved
  function executePush(nodeId, type, targetFolderId, fe) {
    const treeNode = findTreeNode(blueprint.nodes, nodeId);
    const displayNode = flatNodes.find(n => n.id === nodeId);
    if (!treeNode || !displayNode) return;
    const colour = displayNode.colour || '#6B4FBB';
    let msg = '';

    if (type === 'task') {
      fe.horizon = [...fe.horizon, makeHorizonItem(treeNode.label, 'task', targetFolderId)];
      msg = 'Added as Task';

    } else if (type === 'project') {
      const allDesc = collectDescendants(treeNode, '');
      const chunks = allDesc.map((l, i) => makeChunk(l, i));
      fe.horizon = [...fe.horizon, makeHorizonItem(treeNode.label, 'project', targetFolderId, chunks)];
      msg = chunks.length > 0 ? `Project + ${chunks.length} step${chunks.length > 1 ? 's' : ''}` : 'Added as Project';

    } else if (type === 'folder') {
      // Creates a new folder inside the target tab
      const folder = makeFolder(treeNode.label, colour, pushTargetTabId, fe.folders.length);
      fe.folders = [...fe.folders, folder];
      let chunkCount = 0;
      const newItems = [];
      (treeNode.children || []).forEach(child => {
        const directChunks = (child.children || []).map((gc, i) => makeChunk(gc.label, i));
        let extra = [];
        (child.children || []).forEach(gc => {
          (gc.children || []).forEach((ggc, i) => {
            extra.push(makeChunk(`${gc.label} › ${ggc.label}`, directChunks.length + extra.length + i));
          });
        });
        const allChunks = [...directChunks, ...extra];
        chunkCount += allChunks.length;
        newItems.push(makeHorizonItem(child.label, 'project', folder.id, allChunks));
      });
      fe.horizon = [...fe.horizon, ...newItems];
      const pc = (treeNode.children || []).length;
      msg = pc > 0 ? `Folder + ${pc} project${pc > 1 ? 's' : ''} + ${chunkCount} step${chunkCount !== 1 ? 's' : ''}` : 'Added as Folder';

    } else if (type === 'tab') {
      const tab = makeTab(treeNode.label, colour);
      fe.tabs = [...fe.tabs, tab];
      let folderCount = 0, projectCount = 0, chunkCount = 0;
      (treeNode.children || []).forEach(child => {
        const folder = makeFolder(child.label, colour, tab.id, fe.folders.length + folderCount);
        fe.folders = [...fe.folders, folder];
        folderCount++;
        (child.children || []).forEach(gc => {
          const directChunks = (gc.children || []).map((ggc, i) => makeChunk(ggc.label, i));
          let extra = [];
          (gc.children || []).forEach(ggc => {
            (ggc.children || []).forEach((d5, i) => {
              extra.push(makeChunk(`${ggc.label} › ${d5.label}`, directChunks.length + extra.length + i));
            });
          });
          const allChunks = [...directChunks, ...extra];
          chunkCount += allChunks.length;
          fe.horizon = [...fe.horizon, makeHorizonItem(gc.label, 'project', folder.id, allChunks)];
          projectCount++;
        });
      });
      msg = `Tab + ${folderCount} folder${folderCount !== 1 ? 's' : ''} + ${projectCount} project${projectCount !== 1 ? 's' : ''} + ${chunkCount} step${chunkCount !== 1 ? 's' : ''}`;
    }

    saveFEData(fe);
    setPushFeedback(msg);
    setTimeout(() => { setPushFeedback(null); setPushStage(null); setPushNodeId(null); setPushTargetTabId(null); setPushTargetFolderId(null); setPendingPushType(null); }, 2500);
  }

  function pushAsType(nodeId, type) {
    // Tab push: always creates its own tab, no routing needed
    if (type === 'tab') {
      const fe = getFEData();
      executePush(nodeId, 'tab', null, fe);
      return;
    }
    // All other types: route through Blueprint tab logic
    const fe = getFEData();
    const blueprintTab = fe.tabs.find(t => t.name === 'Blueprint');

    if (!blueprintTab) {
      // No Blueprint tab — create it + default Blueprint folder, push straight in
      const { tab, fe: fe2 } = resolveOrCreateBlueprintTab(fe);
      const displayNode = flatNodes.find(n => n.id === nodeId);
      const colour = displayNode ? displayNode.colour : '#6B4FBB';
      if (type === 'folder') {
        // Folder becomes its own folder inside Blueprint tab — no extra folder needed
        setPushTargetTabId(tab.id);
        setPushTargetFolderId(null);
        executePush(nodeId, 'folder', null, fe2);
      } else {
        // Task/project — put in Blueprint folder inside Blueprint tab
        const { folder, fe: fe3 } = resolveOrCreateBlueprintFolder(fe2, tab.id, colour);
        setPushTargetTabId(tab.id);
        executePush(nodeId, type, folder.id, fe3);
      }
    } else {
      // Blueprint tab exists — show folder picker
      setPushTargetTabId(blueprintTab.id);
      setPendingPushType(type);
      setPushStage('folder-pick');
    }
  }

  async function handleAddChild() {
    if (!newLabel.trim() || !addingTo) return;
    const countChildren = (nodes, id) => {
      for (const n of nodes) {
        if (n.id === id) return (n.children || []).length;
        if (n.children) { const r = countChildren(n.children, id); if (r !== -1) return r; }
      }
      return -1;
    };
    const count = countChildren(blueprint.nodes, addingTo);
    if (count >= 20) return;
    const child = { id: genId('n'), label: newLabel.trim(), done: false, children: [] };
    const updated = { ...blueprint, nodes: addChildToNode(blueprint.nodes, addingTo, child), updatedAt: new Date().toISOString() };
    await onUpdateBlueprint(updated);
    setNewLabel('');
    setAddingTo(null);
    addingToActive.current = false;
  }

  async function handleRename() {
    if (!renameValue.trim() || !renamingId) { setRenamingId(null); return; }
    const updated = { ...blueprint, nodes: updateNodeInTree(blueprint.nodes, renamingId, n => ({ ...n, label: renameValue.trim() })), updatedAt: new Date().toISOString() };
    await onUpdateBlueprint(updated);
    setRenamingId(null);
    setRenameValue('');
  }

  async function handleRenameRoot() {
    if (!renameRootValue.trim()) { setRenamingRoot(false); return; }
    const newBp = { ...blueprint, title: renameRootValue.trim(), updatedAt: new Date().toISOString() };
    await onUpdateBlueprint(newBp);
    setRenamingRoot(false);
    setRenameRootValue('');
  }

  async function handleDeleteNode(e, nodeId) {
    e.stopPropagation();
    if (!window.confirm('Remove this node and all its children?')) return;
    const updated = { ...blueprint, nodes: deleteNodeInTree(blueprint.nodes, nodeId), updatedAt: new Date().toISOString() };
    await onUpdateBlueprint(updated);
    if (expandedId === nodeId) setExpandedId(null);
  }

  async function handleAddRootNode(name) {
    const newNode = {
      id: genId('n'), label: name, done: false,
      colour: DOMAIN_COLOURS[nodes.length % DOMAIN_COLOURS.length],
      children: []
    };
    const updated = { ...blueprint, nodes: [...blueprint.nodes, newNode], updatedAt: new Date().toISOString() };
    await onUpdateBlueprint(updated);
  }

  async function handleAddRoot() {
    if (!rootLabel.trim()) { setAddingRoot(false); addingRootActive.current = false; return; }
    await handleAddRootNode(rootLabel.trim());
    setRootLabel('');
    setAddingRoot(false);
    addingRootActive.current = false;
  }

  // Transition style for nodes — expand from centre
  const transBase = animPhase < 2
    ? `all 0.6s cubic-bezier(0.34,1.05,0.64,1)`
    : `opacity 0.3s ease`;

  return (
    <div
      ref={canvasRef}
      style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden', cursor: isPanning.current ? 'grabbing' : 'grab' }}
      onWheel={handleWheel}
      onMouseDown={handleMouseDown}
      onTouchStart={e => { if (e.touches.length === 2) e.preventDefault(); }}
      onTouchMove={e => { if (e.touches.length === 2) e.preventDefault(); }}
      onMouseMove={handleMouseMove}
      onMouseUp={handleMouseUp}
      onMouseLeave={handleMouseUp}
    >
      {/* Click-away overlay — sits behind SVG, catches background clicks */}
      {(expandedId !== null || addingTo !== null || addingRoot || showWhy || renamingRoot) && (
        <div
          style={{ position:'absolute', inset:0, zIndex:1, cursor:'default' }}
          onPointerDown={e => {
            if (!didPan.current) {
              setExpandedId(null);
              setAddingTo(null);
              setNewLabel('');
              addingToActive.current = false;
              setPushStage(null);
              setPushNodeId(null);
              setAddingRoot(false);
              addingRootActive.current = false;
              setRootLabel('');
              setShowWhy(false);
              setRenamingRoot(false);
              setRenameRootValue('');
            }
          }}
        />
      )}
      <svg
        style={{ width:'100%', height:'100%', position:'absolute', top:0, left:0, touchAction:'none', zIndex:2, pointerEvents:'none' }}
      >
        <defs>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');`}</style>
          <radialGradient id="cGrad" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stopColor="#1E1640"/>
            <stop offset="60%" stopColor="#130F2E"/>
            <stop offset="100%" stopColor="#0A0818"/>
          </radialGradient>
          <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="3" stdDeviation="7" floodOpacity="0.4"/>
          </filter>
          <filter id="centerGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feDropShadow dx="0" dy="6" stdDeviation="20" floodColor="#6B4FBB" floodOpacity="0.35"/>
          </filter>
        </defs>

        <g transform={`translate(${transform.x},${transform.y}) scale(${transform.scale})`} style={{pointerEvents:'all'}}>

          {/* Root edges — centre to depth-0 nodes */}
          {flatNodes.filter(n => n.depth === 0).map(n => (
            <line key={'root-e-'+n.id}
              x1={cx} y1={cy} x2={n.x} y2={n.y}
              stroke={n.displayColour || n.colour}
              strokeWidth="1.8"
              opacity={animPhase < 2 ? 0 : 0.35}
              style={{ transition: animPhase < 2 ? 'opacity 0.5s ease 0.3s' : 'opacity 0.3s ease' }}
            />
          ))}
          {/* Branch edges — parent to child */}
          {flatEdges.map((e, i) => (
            <line key={'e'+i}
              x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
              stroke={e.col}
              strokeWidth={e.depth === 1 ? 1.3 : 0.9}
              opacity={animPhase < 2 ? 0 : 0.28}
              style={{ transition: animPhase < 2 ? 'opacity 0.5s ease 0.4s' : 'opacity 0.3s ease' }}
            />
          ))}

          {/* Nodes — rendered back to front by depth */}
          {flatNodes.sort((a,b) => a.depth - b.depth).map(n => {
            const pos = getNodePos(n);
            const R = nodeRadius(n.label, n.depth);
            const labelLines = splitLabel(n.label);
            const fs = n.depth === 0 ? 10 : n.depth === 1 ? 8.5 : 7.5;
            const fw = n.depth === 0 ? 800 : 700;
            const col = n.displayColour || n.colour;
            const total = countDescendants(n) + (n.depth > 0 ? 1 : 0);
            const done = n.depth > 0 ? (n.done ? 1 : 0) : countDone({...n, children: flatNodes.filter(fn => fn.parentId === n.id).map(fn => ({...fn, children:[]}))});
            const isHolding = holdNodeId === n.id;
            const holdCircumference = 2 * Math.PI * (R + 4);
            const holdDash = holdCircumference * (holdProgress / 100);
            const animDelay = animPhase === 1 ? `${n.depth * 0.08 + (flatNodes.indexOf(n) % (nodes.length || 1)) * 0.06}s` : '0s';

            const tx = animPhase === 0 ? cx : n.x;
            const ty = animPhase === 0 ? cy : n.y;
            return (
              <g key={n.id}
                style={{
                  cursor: 'pointer',
                  opacity: animPhase === 0 ? 0 : 1,
                  transform: `translate(${tx}px, ${ty}px)`,
                  transformOrigin: '0px 0px',
                  transition: animPhase === 0
                    ? 'none'
                    : animPhase === 1
                    ? `opacity 0.4s ease ${animDelay}, transform 0.65s cubic-bezier(0.34,1.05,0.64,1) ${animDelay}`
                    : 'opacity 0.3s ease, transform 0.3s ease'
                }}
                onPointerDown={e => handleNodePointerDown(e, n.id)}
                onPointerUp={e => handleNodePointerUp(e, n)}
                onPointerLeave={cancelHold}
              >
                {/* Outer glow ring */}
                <circle cx={0} cy={0} r={R + 8}
                  fill="none" stroke={col} strokeWidth="1"
                  opacity={expandedId === n.id ? 0.25 : 0.08}
                  style={{ transition: 'all 0.3s ease' }}
                />
                {/* Main body — fill driven by child completion if has children */}
                {(() => {
                  const directChildren = flatNodes.filter(fn => fn.parentId === n.id);
                  const hasKids = directChildren.length > 0;
                  const findInTree = (nodes, id) => {
                    for (const nd of nodes) {
                      if (nd.id === id) return nd;
                      if (nd.children) { const r = findInTree(nd.children, id); if (r) return r; }
                    }
                    return null;
                  };
                  const treeNode = findInTree(blueprint.nodes, n.id);
                  const prog = treeNode ? nodeProgress(treeNode) : (n.done ? 1 : 0);
                  const isFullDone = prog >= 1;
                  // Bottom-up fill: rect starting at bottom of circle, growing upward
                  // Circle radius R, centred at 0,0
                  // Fill rect: x=-R, y = R - prog*2R, width=2R, height=prog*2R
                  const fillH = prog * R * 2;
                  const fillY = R - fillH; // top of the fill rect
                  const clipId = `clip-${n.id.replace(/[^a-z0-9]/gi,'_')}`;
                  return (
                    <>
                      {/* Clip path — constrains fill exactly to circle boundary */}
                      <clipPath id={clipId}>
                        <circle cx={0} cy={0} r={R - 0.5}/>
                      </clipPath>
                      {/* Base circle */}
                      <circle cx={0} cy={0} r={R}
                        fill={(() => {
                          if (isFullDone) return n.colour; // full strength on completion
                          if (expandedId === n.id) return '#1E1848';
                          if (n.depth === 0) return '#16123A';
                          try {
                            const [r,g,b] = hexToRgb(n.colour);
                            const bgR=13,bgG=10,bgB=26;
                            const t = n.depth === 1 ? 0.14 : 0.08;
                            return `rgb(${Math.round(bgR+(r-bgR)*t)},${Math.round(bgG+(g-bgG)*t)},${Math.round(bgB+(b-bgB)*t)})`;
                          } catch(e) { return '#16123A'; }
                        })()}
                        stroke={isFullDone ? n.colour : col}
                        strokeWidth={expandedId === n.id ? 2.5 : (n.depth === 0 ? 2 : n.depth === 1 ? 1.5 : 1)}
                        filter={n.depth === 0 || isFullDone ? "url(#glow)" : undefined}
                        style={{ transition: 'fill 0.4s ease, stroke-width 0.2s ease' }}
                      />
                      {/* Bottom-up fill — clipped to circle, hidden when fully done (base handles it) */}
                      {prog > 0 && !isFullDone && (
                        <rect
                          x={-R} y={fillY}
                          width={R * 2} height={fillH}
                          fill={n.colour}
                          clipPath={`url(#${clipId})`}
                          opacity={0.8}
                          style={{ transition: 'y 0.45s ease, height 0.45s ease' }}
                        />
                      )}
                      {/* Stroke on top to keep circle border clean */}
                      <circle cx={0} cy={0} r={R}
                        fill="none"
                        stroke={isFullDone ? n.colour : col}
                        strokeWidth={expandedId === n.id ? 2.5 : (n.depth === 0 ? 2 : n.depth === 1 ? 1.5 : 1)}
                        style={{ transition: 'stroke 0.4s ease, stroke-width 0.2s ease' }}
                      />
                    </>
                  );
                })()}
                {/* Hold progress ring */}
                {isHolding && (
                  <circle cx={0} cy={0} r={R + 4}
                    fill="none" stroke={col} strokeWidth="2.5"
                    strokeDasharray={`${holdDash} ${holdCircumference}`}
                    strokeLinecap="round"
                    transform="rotate(-90 0 0)"
                    opacity="0.9"
                  />
                )}
                {/* Label */}
                {labelLines.map((ln, li) => (
                  <text key={li}
                    x={0} y={(li - (labelLines.length-1)/2) * (n.depth === 0 ? 13 : 11)}
                    textAnchor="middle" dominantBaseline="middle"
                    fill="white"
                    fontSize={fs}
                    fontFamily="'Montserrat', sans-serif"
                    fontWeight={fw}
                    letterSpacing="0.6"
                    style={{ pointerEvents: editMode ? 'auto' : 'none', cursor: editMode ? 'text' : 'default' }}
                    onClick={editMode ? e => { e.stopPropagation(); setRenamingId(n.id); setRenameValue(n.label); } : undefined}
                  >{ln}</text>
                ))}
                {/* Child count badge */}
                {(n.children||[]).length > 0 && n.depth > 0 && (
                  <text x={0} y={R + 12}
                    textAnchor="middle" dominantBaseline="middle"
                    fill={col} fontSize="8"
                    fontFamily="'Montserrat', sans-serif" fontWeight="700"
                    opacity="0.8"
                    style={{ pointerEvents:'none' }}
                  >+{(n.children||[]).length}</text>
                )}
                {/* Delete button — edit mode only */}
                {editMode && (
                  <>
                    <circle cx={R - 3} cy={-R + 3} r={9}
                      fill="#1A1035" stroke={col} strokeWidth="1.5"
                      onClick={e => handleDeleteNode(e, n.id)}
                      style={{ cursor:'pointer' }}
                    />
                    <text x={R - 3} y={-R + 4}
                      textAnchor="middle" dominantBaseline="middle"
                      fill="#CCC" fontSize="8" fontFamily="Montserrat" fontWeight="800"
                      style={{ pointerEvents:'none' }}
                    >✕</text>
                  </>
                )}
              </g>
            );
          })}

          {/* Central node — tap for Why, hold to add domain */}
          {(() => {
            const rootHolding = holdNodeId === '__root__';
            const rootHoldCirc = 2 * Math.PI * CR;
            const rootHoldDash = rootHoldCirc * (holdProgress / 100);
            return (
              <g
                style={{ cursor: 'pointer' }}
                onPointerDown={e => {
                  e.stopPropagation();
                  if (addingRootActive.current) return;
                  rootDownTime.current = Date.now();
                  rootHoldFired.current = false;
                  // Delay starting the hold animation — taps under 200ms never see the ring
                  rootDelayTimer.current = setTimeout(() => {
                    setHoldNodeId('__root__');
                    setHoldProgress(0);
                    holdInterval.current = setInterval(() => {
                      const elapsed = Date.now() - rootDownTime.current;
                      const prog = Math.min(100, (elapsed / HOLD_MS) * 100);
                      setHoldProgress(prog);
                      if (prog >= 100) {
                        clearInterval(holdInterval.current);
                        holdInterval.current = null;
                        rootHoldFired.current = true;
                        addingRootActive.current = true;
                        setHoldNodeId(null);
                        setHoldProgress(0);
                        setAddingRoot(true);
                        setRootLabel('');
                      }
                    }, 16);
                  }, 200);
                }}
                onPointerUp={e => {
                  e.stopPropagation();
                  clearTimeout(rootDelayTimer.current);
                  clearInterval(holdInterval.current);
                  holdInterval.current = null;
                  setHoldNodeId(null);
                  setHoldProgress(0);
                  if (addingRootActive.current) return;
                  if (rootHoldFired.current) return;
                  // Short tap — always open Why panel
                  setShowWhy(true);
                }}
                onPointerLeave={e => {
                  clearTimeout(rootDelayTimer.current);
                  clearInterval(holdInterval.current);
                  holdInterval.current = null;
                  setHoldNodeId(null);
                  setHoldProgress(0);
                }}
              >
                <circle cx={cx} cy={cy} r={CR + 12}
                  fill="none" stroke="var(--purple-light)" strokeWidth="1" opacity="0.15"
                />
                <circle cx={cx} cy={cy} r={CR}
                  fill="url(#cGrad)" stroke="var(--purple-light)" strokeWidth="1"
                  filter="url(#centerGlow)"
                  opacity="0.95"
                  style={{ opacity: animPhase === 0 ? 0 : 1, transition:'opacity 0.4s ease' }}
                />
                {/* Hold progress ring on central node */}
                {rootHolding && (
                  <circle cx={cx} cy={cy} r={CR + 6}
                    fill="none" stroke="var(--purple-light)" strokeWidth="2.5"
                    strokeDasharray={`${rootHoldDash} ${rootHoldCirc}`}
                    strokeLinecap="round"
                    transform={`rotate(-90 ${cx} ${cy})`}
                    opacity="0.9"
                  />
                )}
                {tLines.map((ln, li) => (
                  <text key={li}
                    x={cx} y={cy + (li - (tLines.length-1)/2) * 16}
                    textAnchor="middle" dominantBaseline="middle"
                    fill="white" fontSize="12"
                    fontFamily="'Montserrat', sans-serif" fontWeight="900"
                    letterSpacing="1.5"
                    style={{ pointerEvents:'none', opacity: animPhase === 0 ? 0 : 1, transition:'opacity 0.4s ease 0.2s' }}
                  >{ln}</text>
                ))}
                {/* + tap hint inside central node */}
                <circle cx={cx} cy={cy + CR - 16} r={9}
                  fill="rgba(107,79,187,0.25)" stroke="var(--purple-light)" strokeWidth="1"
                  style={{ pointerEvents:'none', opacity: animPhase === 2 ? 0.7 : 0, transition:'opacity 0.3s ease' }}
                />
                <text x={cx} y={cy + CR - 15}
                  textAnchor="middle" dominantBaseline="middle"
                  fill="var(--purple-light)" fontSize="13"
                  fontFamily="'Montserrat', sans-serif" fontWeight="400"
                  style={{ pointerEvents:'none', opacity: animPhase === 2 ? 0.9 : 0, transition:'opacity 0.3s ease' }}
                >+</text>
                {/* Edit mode — pencil on central node */}
                {editMode && (
                  <g
                    onPointerDown={e => {
                      e.stopPropagation();
                      // Cancel any hold in progress, then open rename
                      clearTimeout(rootDelayTimer.current);
                      clearInterval(holdInterval.current);
                      holdInterval.current = null;
                      setHoldNodeId(null);
                      setHoldProgress(0);
                      setRenamingRoot(true);
                      setRenameRootValue(blueprint.title || '');
                    }}
                    onPointerUp={e => e.stopPropagation()}
                    style={{ cursor:'pointer' }}>
                    <circle cx={cx + CR - 3} cy={cy - CR + 3} r={10}
                      fill="#1A1035" stroke="var(--purple-light)" strokeWidth="1.5"
                    />
                    <text x={cx + CR - 3} y={cy - CR + 4}
                      textAnchor="middle" dominantBaseline="middle"
                      fill="var(--purple-light)" fontSize="9"
                      fontFamily="Montserrat" fontWeight="800"
                      style={{ pointerEvents:'none' }}
                    >✏</text>
                  </g>
                )}
              </g>
            );
          })()}



          {/* Hold hint tooltip */}
          {holdNodeId && (
            <g style={{ pointerEvents:'none' }}>
              {(() => {
                const hn = flatNodes.find(n => n.id === holdNodeId);
                if (!hn) return null;
                return (
                  <text x={hn.x} y={hn.y - nodeRadius(hn.label, hn.depth) - 14}
                    textAnchor="middle" dominantBaseline="middle"
                    fill="var(--text-mid)" fontSize="9"
                    fontFamily="'Montserrat', sans-serif" fontWeight="600"
                    opacity="0.8"
                  >Hold to add branch…</text>
                );
              })()}
            </g>
          )}

          {/* Inline add-child + Push to FE */}
          {addingTo && (() => {
            const parentNode = flatNodes.find(n => n.id === addingTo);
            if (!parentNode) return null;
            const col = parentNode.displayColour || parentNode.colour;
            const fullCol = parentNode.colour;
            const iy = parentNode.y + nodeRadius(parentNode.label, parentNode.depth) + 28;
            const foHeight = pushStage === 'choice' ? 210 : ['warn-project','warn-folder','warn-tab'].includes(pushStage) ? 160 : pushStage === 'folder-pick' ? 220 : 100;
            return (
              <foreignObject
                x={parentNode.x - 130} y={iy}
                width={260} height={foHeight}
                onClick={e => e.stopPropagation()}
              >
                {/* Add branch box */}
                <div style={{
                  display:'flex', gap:6, alignItems:'center',
                  background:'rgba(18,15,42,0.97)',
                  border:`1.5px solid ${col}`,
                  borderRadius:10, padding:'8px 10px',
                  boxShadow:'0 4px 20px rgba(0,0,0,0.5)',
                  marginBottom:6
                }}>
                  <input
                    autoFocus
                    style={{
                      background:'transparent', border:'none', outline:'none',
                      fontFamily:'Montserrat,sans-serif', fontSize:12, fontWeight:600,
                      color:'white', flex:1, minWidth:0
                    }}
                    placeholder="Branch label..."
                    value={newLabel}
                    onChange={e => setNewLabel(e.target.value)}
                    onKeyDown={e => { e.stopPropagation(); if (e.key==='Enter') handleAddChild(); if (e.key==='Escape') { setAddingTo(null); addingToActive.current = false; setPushStage(null); } }}
                  />
                  <span
                    onClick={handleAddChild}
                    style={{ fontSize:10, fontWeight:900, letterSpacing:'1px', textTransform:'uppercase', color:col, cursor:'pointer', whiteSpace:'nowrap' }}
                  >Add</span>
                </div>

                {/* Push to Focus Engine box */}
                {(() => {
                  const treeNode = pushNodeId ? findTreeNode(blueprint.nodes, pushNodeId) : null;
                  return pushFeedback ? (
                    <div style={{
                      background:'rgba(11,191,191,0.15)', border:'1.5px solid var(--teal)',
                      borderRadius:10, padding:'8px 12px', textAlign:'center',
                      fontFamily:'Montserrat,sans-serif', fontSize:11, fontWeight:700,
                      color:'var(--teal)', letterSpacing:'0.5px'
                    }}>{pushFeedback}</div>
                  ) : pushStage === null ? (
                    <div
                      onClick={() => { setPushStage('choice'); setPushNodeId(addingTo); }}
                      style={{
                        background:'rgba(18,15,42,0.97)', border:'1.5px solid rgba(107,79,187,0.5)',
                        borderRadius:10, padding:'8px 12px', cursor:'pointer',
                        fontFamily:'Montserrat,sans-serif', fontSize:10, fontWeight:700,
                        color:'var(--purple-light)', letterSpacing:'1.5px', textTransform:'uppercase',
                        textAlign:'center'
                      }}
                    >→ Push to Focus Engine</div>
                  ) : pushStage === 'choice' ? (
                    <div style={{
                      background:'rgba(18,15,42,0.97)', border:`1.5px solid ${fullCol}`,
                      borderRadius:10, padding:'10px 12px', fontFamily:'Montserrat,sans-serif'
                    }}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                        <div style={{fontSize:9, fontWeight:900, letterSpacing:'1.5px', textTransform:'uppercase', color:'var(--text-dim)'}}>Push to Focus Engine as</div>
                        <span onClick={() => setPushStage(null)} style={{color:'var(--text-faint)', cursor:'pointer', fontSize:11}}>✕</span>
                      </div>
                      {/* Warning if deep structure */}
                      {treeNode && subtreeDepth(treeNode) > 3 && (
                        <div style={{fontSize:9, color:'#F0B429', marginBottom:8, lineHeight:1.4, fontFamily:'Montserrat,sans-serif', fontWeight:600}}>
                          ⚠ Deep structure detected. Only 4 levels max will map to Focus Engine.
                        </div>
                      )}
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:5}}>
                        {[
                          {label:'Launch', desc:'Brain dump', action: () => pushAsLaunch(pushNodeId), solid:true},
                          {label:'Task',   desc:'Single item',   action: () => pushAsType(pushNodeId,'task')},
                          {label:'Project',desc:'+ steps',       action: () => {
                            const w = treeNode ? pushWarning(treeNode,'project') : null;
                            if (w) { setPushStage('warn-project'); } else { pushAsType(pushNodeId,'project'); }
                          }},
                          {label:'Folder', desc:'+ projects',    action: () => {
                            const w = treeNode ? pushWarning(treeNode,'folder') : null;
                            if (w) { setPushStage('warn-folder'); } else { pushAsType(pushNodeId,'folder'); }
                          }},
                          {label:'Tab',    desc:'Full hierarchy', action: () => {
                            const w = treeNode ? pushWarning(treeNode,'tab') : null;
                            if (w) { setPushStage('warn-tab'); } else { pushAsType(pushNodeId,'tab'); }
                          }, wide:true},
                        ].map(opt => (
                          <div key={opt.label}
                            onClick={opt.action}
                            style={{
                              gridColumn: opt.wide ? 'span 2' : 'span 1',
                              background: opt.solid ? fullCol : 'transparent',
                              color: opt.solid ? '#0D0A1A' : fullCol,
                              border: `1px solid ${fullCol}`,
                              borderRadius:7, padding:'6px 8px', cursor:'pointer',
                              textAlign:'center'
                            }}
                          >
                            <div style={{fontSize:10, fontWeight:900, letterSpacing:'0.5px', textTransform:'uppercase', fontFamily:'Montserrat,sans-serif'}}>{opt.label}</div>
                            <div style={{fontSize:8, opacity:0.7, fontFamily:'Montserrat,sans-serif', fontWeight:600}}>{opt.desc}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : ['warn-project','warn-folder','warn-tab'].includes(pushStage) ? (
                    <div style={{
                      background:'rgba(18,15,42,0.97)', border:`1.5px solid #F0B429`,
                      borderRadius:10, padding:'10px 12px', fontFamily:'Montserrat,sans-serif'
                    }}>
                      <div style={{fontSize:9, fontWeight:700, color:'#F0B429', marginBottom:8, lineHeight:1.5}}>
                        {treeNode ? pushWarning(treeNode, pushStage.replace('warn-','')) : ''}
                      </div>
                      <div style={{display:'flex', gap:6}}>
                        <span
                          onClick={() => pushAsType(pushNodeId, pushStage.replace('warn-',''))}
                          style={{flex:1, background:fullCol, color:'#0D0A1A', borderRadius:7, padding:'7px 0', textAlign:'center', cursor:'pointer', fontSize:10, fontWeight:900, letterSpacing:'1px', textTransform:'uppercase', fontFamily:'Montserrat,sans-serif'}}
                        >Continue</span>
                        <span
                          onClick={() => setPushStage('choice')}
                          style={{flex:1, background:'transparent', color:'var(--text-dim)', border:'1px solid var(--border)', borderRadius:7, padding:'7px 0', textAlign:'center', cursor:'pointer', fontSize:10, fontWeight:700, textTransform:'uppercase', fontFamily:'Montserrat,sans-serif'}}
                        >Back</span>
                      </div>
                    </div>
                  ) : pushStage === 'folder-pick' ? (
                    // Blueprint tab exists — pick folder destination
                    (() => {
                      const fe = getFEData();
                      const tabFolders = fe.folders.filter(f => f.tabId === pushTargetTabId);
                      const displayNode = flatNodes.find(n => n.id === pushNodeId);
                      const col2 = displayNode ? (displayNode.displayColour || displayNode.colour) : fullCol;
                      const fullCol2 = displayNode ? displayNode.colour : fullCol;
                      return (
                        <div style={{
                          background:'rgba(18,15,42,0.97)', border:`1.5px solid ${fullCol2}`,
                          borderRadius:10, padding:'10px 12px', fontFamily:'Montserrat,sans-serif'
                        }}>
                          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                            <div style={{fontSize:9, fontWeight:900, letterSpacing:'1.5px', textTransform:'uppercase', color:'var(--text-dim)'}}>Add to Blueprint tab as</div>
                            <span onClick={() => setPushStage('choice')} style={{color:'var(--text-faint)', cursor:'pointer', fontSize:11}}>✕</span>
                          </div>
                          {/* Option 1: Generic Blueprint folder */}
                          <div
                            onClick={() => {
                              const fe2 = getFEData();
                              const colour = displayNode ? displayNode.colour : '#6B4FBB';
                              if (pendingPushType === 'folder') {
                                executePush(pushNodeId, 'folder', null, fe2);
                              } else {
                                const { folder, fe: fe3 } = resolveOrCreateBlueprintFolder(fe2, pushTargetTabId, colour);
                                executePush(pushNodeId, pendingPushType, folder.id, fe3);
                              }
                            }}
                            style={{
                              background:'rgba(107,79,187,0.15)', border:'1px solid var(--purple-light)',
                              borderRadius:8, padding:'8px 10px', cursor:'pointer', marginBottom:6
                            }}
                          >
                            <div style={{fontSize:10, fontWeight:900, letterSpacing:'1px', textTransform:'uppercase', color:'var(--purple-light)'}}>Blueprint folder</div>
                            <div style={{fontSize:9, color:'var(--text-dim)', marginTop:2}}>Generic folder inside Blueprint tab</div>
                          </div>
                          {/* Existing folders */}
                          {tabFolders.length > 0 && (
                            <>
                              <div style={{fontSize:9, fontWeight:700, color:'var(--text-faint)', letterSpacing:'1px', textTransform:'uppercase', marginBottom:5, marginTop:4}}>Or existing folder</div>
                              <div style={{maxHeight:90, overflowY:'auto', display:'flex', flexDirection:'column', gap:4}}>
                                {tabFolders.map(f => (
                                  <div
                                    key={f.id}
                                    onClick={() => {
                                      const fe2 = getFEData();
                                      executePush(pushNodeId, pendingPushType, f.id, fe2);
                                    }}
                                    style={{
                                      background:'rgba(18,15,42,0.97)', border:`1px solid ${f.color || 'var(--border)'}`,
                                      borderRadius:8, padding:'7px 10px', cursor:'pointer',
                                      display:'flex', alignItems:'center', gap:8
                                    }}
                                  >
                                    <div style={{width:8, height:8, borderRadius:'50%', background: f.color || 'var(--border)', flexShrink:0}}/>
                                    <span style={{fontSize:11, fontWeight:700, color:'var(--text)', textTransform:'uppercase', letterSpacing:'0.5px'}}>{f.name}</span>
                                  </div>
                                ))}
                              </div>
                            </>
                          )}
                        </div>
                      );
                    })()
                  ) : null;
                })()}
              </foreignObject>
            );
          })()}

          {/* Rename input */}

// ── Main app (post-auth) ──────────────────────────────────────
function BlueprintApp({ userEmail, userPath }) {
  const [appState, setAppState] = useState('loading');
  const [blueprintMaps, setBlueprintMaps] = useState([]);
  const [pendingAnswers, setPendingAnswers] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [activeBlueprintId, setActiveBlueprintId] = useState(null);

  useEffect(() => {
    async function init() {
      try {
        await loadFromFirebase(userPath);
        const maps = ls('tapl-blueprint-maps', []);
        setBlueprintMaps(maps);
        setAppState('dashboard');
      } catch(e) {
        console.error('Firebase load error:', e);
        const maps = ls('tapl-blueprint-maps', []);
        setBlueprintMaps(maps);
        setAppState('dashboard');
      }
    }
    init();
  }, [userPath]);

  // Listen for Focus Engine data writes from Blueprint push actions
  useEffect(() => {
    async function handleFESync() {
      try { await saveToFirebase(userPath); } catch(e) { console.error('FE sync error:', e); }
    }
    window.addEventListener('tapl-fe-sync', handleFESync);
    return () => window.removeEventListener('tapl-fe-sync', handleFESync);
  }, [userPath]);

  const handleClarifyComplete = (answers) => {
    setPendingAnswers(answers);
    setAppState('summary');
  };

  const handleConfirmBlueprint = async () => {
    const newMap = {
      id: 'bp_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      title: pendingAnswers[0],
      clarificationAnswers: pendingAnswers,
      nodes: [],
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    const updated = [...blueprintMaps, newMap];
    setBlueprintMaps(updated);
    lsSet('tapl-blueprint-maps', updated);
    try { await saveToFirebase(userPath); } catch(e) { console.error('Save error:', e); }
    fireConfetti(3000);
    setAppState('dashboard');
    setPendingAnswers(null);
  };

  if (appState === 'loading') {
    return (
      <div className="app-shell">
        <div className="status-card">
          <div className="spinner"/>
          <p className="status-body">Loading your Blueprints...</p>
        </div>
      </div>
    );
  }

  if (appState === 'clarify') {
    return (
      <ClarificationSequence
        onComplete={handleClarifyComplete}
        onSkip={() => setAppState('presets')}
      />
    );
  }

  if (appState === 'presets') {
    return (
      <PresetsScreen
        onSelect={async (preset) => {
          const newMap = {
            id: 'bp_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
            title: preset.title,
            clarificationAnswers: [],
            nodes: preset.nodes.map((name, i) => ({
              id: genId('n'),
              label: name,
              done: false,
              colour: DOMAIN_COLOURS[i % DOMAIN_COLOURS.length],
              children: []
            })),
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };
          const updated = [...blueprintMaps, newMap];
          setBlueprintMaps(updated);
          lsSet('tapl-blueprint-maps', updated);
          try { await saveToFirebase(userPath); } catch(e) { console.error(e); }
          fireConfetti(2500);
          setAppState('dashboard');
        }}
        onBack={() => setAppState('dashboard')}
      />
    );
  }

  if (appState === 'summary') {
    return (
      <SummaryScreen
        answers={pendingAnswers}
        onConfirm={handleConfirmBlueprint}
        onEdit={() => setAppState('clarify')}
      />
    );
  }

  const handleUpdateBlueprint = async (updated) => {
    const newMaps = blueprintMaps.map(m => m.id === updated.id ? updated : m);
    setBlueprintMaps(newMaps);
    lsSet('tapl-blueprint-maps', newMaps);
    try { await saveToFirebase(userPath); } catch(e) { console.error('Save error:', e); }
  };

  if (appState === 'map' && activeBlueprintId) {
    const bp = blueprintMaps.find(m => m.id === activeBlueprintId);
    if (bp) return (
      <>
        <canvas id="confetti-canvas"/>
        <MapView
          blueprint={bp}
          onBack={() => { setAppState('dashboard'); setActiveBlueprintId(null); }}
          onUpdateBlueprint={handleUpdateBlueprint}
          userPath={userPath}
        />
      </>
    );
  }

  return (
    <>
      <canvas id="confetti-canvas"/>
      <Dashboard
        maps={blueprintMaps}
        onNew={() => setAppState('clarify')}
        onTemplates={() => setAppState('presets')}
        onOpen={(id) => { setActiveBlueprintId(id); setAppState('map'); }}
        onDelete={async (id) => {
          const updated = blueprintMaps.filter(m => m.id !== id);
          setBlueprintMaps(updated);
          lsSet('tapl-blueprint-maps', updated);
          try { await saveToFirebase(userPath); } catch(e) { console.error(e); }
        }}
      />
    </>
  );
}

// ── Root ──────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('checking');
  const [userEmail, setUserEmail] = useState(null);
  const [userPath, setUserPath] = useState(null);
  const [isDark, setIsDark] = useState(true);

  useEffect(() => {
    const saved = localStorage.getItem('tapl-blueprint-email');
    if (saved) {
      handleAuth(saved);
    } else {
      setAuthState('login');
    }
    // Load saved theme
    const savedTheme = localStorage.getItem('tapl-blueprint-theme');
    const dark = savedTheme !== 'light';
    setIsDark(dark);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }, []);

  function toggleTheme() {
    const next = !isDark;
    setIsDark(next);
    document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
    localStorage.setItem('tapl-blueprint-theme', next ? 'dark' : 'light');
  }

  async function handleAuth(email) {
    setAuthState('loading');
    const hash = await hashEmail(email);
    const path = 'users/' + hash;
    window.__taplUserEmail = email;
    localStorage.setItem('tapl-blueprint-email', email);
    setUserEmail(email);
    setUserPath(path);
    setAuthState('app');
  }

  if (authState === 'checking' || authState === 'loading') {
    return (
      <div className="auth-screen">
        <div className="status-card">
          <div className="spinner"/>
          <p className="status-body">Loading Blueprint...</p>
        </div>
      </div>
    );
  }

  if (authState === 'login') {
    return (
      <>
        <div className="header">
          <div className="header-logo">
            <div className="logo-mark">B</div>
            <div>
              <div className="header-title">Blueprint</div>
              <div className="header-sub">Performance Lab by TAPL</div>
            </div>
          </div>
        </div>
        <AuthScreen onAuth={handleAuth} />
      </>
    );
  }

  return (
    <>
      <div className="header">
        <div className="header-logo">
          <div className="logo-mark">B</div>
          <div>
            <div className="header-title">Blueprint</div>
            <div className="header-sub">Performance Lab by TAPL</div>
          </div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <button
            onClick={toggleTheme}
            title={isDark ? 'Switch to light mode' : 'Switch to dark mode'}
            style={{
              background:'none', border:'1px solid var(--border)',
              borderRadius:8, padding:'6px 10px', cursor:'pointer',
              color:'var(--text-mid)', fontSize:14, lineHeight:1,
              transition:'border-color 0.2s, color 0.2s'
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor='var(--purple-light)'; e.currentTarget.style.color='var(--text)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-mid)'; }}
          >{isDark ? '☀' : '☾'}</button>
          <div className="header-user">{userEmail}</div>
        </div>
      </div>
      <BlueprintApp userEmail={userEmail} userPath={'users/' + userPath.split('/')[1]} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
