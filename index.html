<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Performance Lab by TAPL</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0D0A1A;
  --surface: #13102A;
  --card: #1A1635;
  --border: #2D2558;
  --purple: #2D1B69;
  --purple-mid: #3D2B89;
  --purple-light: #6B4FBB;
  --accent: #E8453C;
  --teal: #0BBFBF;
  --gold: #F0B429;
  --text: #F0EEF8;
  --text-mid: #9B93BB;
  --text-dim: #635A80;
  --text-faint: #3D3560;
  --glow: rgba(107, 79, 187, 0.15);
}

[data-theme="light"] {
  --bg: #F4F2FF;
  --surface: #ECEAF8;
  --card: #FFFFFF;
  --border: #D4D0EE;
  --purple: #2D1B69;
  --purple-mid: #3D2B89;
  --purple-light: #6B4FBB;
  --accent: #E8453C;
  --teal: #0891B2;
  --gold: #D97706;
  --text: #1A1035;
  --text-mid: #4A3F70;
  --text-dim: #7B70A0;
  --text-faint: #B0A8CC;
  --glow: rgba(107, 79, 187, 0.08);
}

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  left: -20%;
  width: 70%;
  height: 70%;
  background: radial-gradient(ellipse, rgba(45,27,105,0.25) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  right: -10%;
  width: 50%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(11,191,191,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

/* Header */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: rgba(13,10,26,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--purple-light), var(--teal));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  color: white;
  letter-spacing: -1px;
}

.header-title {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
}

.header-sub {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 1px;
}

.header-user {
  font-size: 11px;
  color: var(--text-mid);
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* Auth screen */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 24px 24px;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}

.auth-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--purple), var(--purple-mid));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 28px;
  box-shadow: 0 8px 24px rgba(45,27,105,0.4);
}

.auth-heading {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}

.auth-sub {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.6;
  margin-bottom: 32px;
  font-weight: 500;
}

.input-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: block;
}

.input-field {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 16px;
}

.input-field:focus {
  border-color: var(--purple-light);
  box-shadow: 0 0 0 3px rgba(107,79,187,0.15);
}

.input-field::placeholder { color: var(--text-faint); font-weight: 500; }

/* OTP grid */
.otp-grid {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.otp-cell {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 0;
  font-family: 'Montserrat', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.otp-cell:focus {
  border-color: var(--purple-light);
  box-shadow: 0 0 0 3px rgba(107,79,187,0.15);
}

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--purple), var(--purple-mid));
  color: white;
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(45,27,105,0.4);
}

.btn-primary:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(45,27,105,0.5);
}

.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-secondary {
  width: 100%;
  background: transparent;
  color: var(--text-mid);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  margin-top: 10px;
}

.btn-secondary:hover { border-color: var(--purple-light); color: var(--text); }

.auth-message {
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
}

.auth-message.error {
  background: rgba(232,69,60,0.1);
  border: 1px solid rgba(232,69,60,0.3);
  color: #FF6B6B;
}

.auth-message.info {
  background: rgba(107,79,187,0.1);
  border: 1px solid rgba(107,79,187,0.3);
  color: var(--purple-light);
}

.auth-message.success {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3);
  color: #4ADE80;
}

/* Main app */
.app-shell {
  min-height: 100vh;
  padding-top: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.status-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  max-width: 480px;
  width: 100%;
  margin: 24px;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}

.status-icon {
  font-size: 40px;
  margin-bottom: 20px;
}

.status-heading {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  margin-bottom: 12px;
  color: var(--text);
}

.status-body {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.7;
  font-weight: 500;
}

.status-detail {
  margin-top: 20px;
  padding: 14px 16px;
  background: var(--surface);
  border-radius: 10px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.5px;
  font-family: monospace;
  text-align: left;
  word-break: break-all;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--purple-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.dot-pulse {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}

.dot-pulse span {
  width: 6px;
  height: 6px;
  background: var(--purple-light);
  border-radius: 50%;
  animation: pulse 1.2s ease-in-out infinite;
}

.dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
.dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp 0.4s ease-out forwards; }

/* ── Clarification sequence ── */
.clarify-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 24px 24px;
}
.clarify-card {
  width: 100%;
  max-width: 560px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 44px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.clarify-progress { display: flex; gap: 6px; margin-bottom: 36px; }
.clarify-pip { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.4s ease; }
.clarify-pip.active { background: var(--purple-light); }
.clarify-pip.done { background: var(--teal); }
.clarify-step-label { font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
.clarify-question { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
.clarify-hint { font-size: 12px; color: var(--text-dim); font-weight: 500; line-height: 1.6; margin-bottom: 28px; }
.clarify-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text); outline: none; resize: none; min-height: 100px;
  line-height: 1.6; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 20px;
}
.clarify-textarea:focus { border-color: var(--purple-light); box-shadow: 0 0 0 3px rgba(107,79,187,0.15); }
.clarify-textarea::placeholder { color: var(--text-faint); font-weight: 500; }
.clarify-nav { display: flex; gap: 10px; align-items: center; }
.btn-back {
  background: transparent; color: var(--text-dim); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 18px;
  font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: border-color 0.2s, color 0.2s; white-space: nowrap;
}
.btn-back:hover { border-color: var(--purple-light); color: var(--text); }
.prev-answers { margin-bottom: 24px; border-left: 2px solid var(--border); padding-left: 16px; }
.prev-answer-item { margin-bottom: 12px; }
.prev-answer-q { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 3px; }
.prev-answer-a { font-size: 13px; color: var(--text-mid); font-weight: 500; line-height: 1.5; }
.summary-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 24px 24px; }
.summary-card { width: 100%; max-width: 560px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 48px 44px; box-shadow: 0 24px 80px rgba(0,0,0,0.4); }
.summary-label { font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
.summary-answer-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.summary-answer-item:last-child { border-bottom: none; }
.summary-answer-q { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
.summary-answer-a { font-size: 14px; color: var(--text); font-weight: 600; line-height: 1.5; }
.summary-title-wrap { background: linear-gradient(135deg, rgba(45,27,105,0.3), rgba(11,191,191,0.1)); border: 1px solid var(--purple-light); border-radius: 12px; padding: 20px; margin-bottom: 28px; }
.summary-title-label { font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--purple-light); margin-bottom: 8px; }
.summary-title-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); line-height: 1.4; }
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
.dashboard-screen { min-height: 100vh; padding: 80px 24px 40px; max-width: 720px; margin: 0 auto; }
.dashboard-heading { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 8px; margin-top: 32px; }
.dashboard-sub { font-size: 13px; color: var(--text-mid); font-weight: 500; margin-bottom: 32px; }
.btn-new-blueprint {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--purple), var(--purple-mid));
  color: white; border: none; border-radius: 12px; padding: 14px 24px;
  font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 4px 16px rgba(45,27,105,0.4); margin-bottom: 40px;
}
.btn-new-blueprint:hover { opacity: 0.9; transform: translateY(-1px); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-state-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.4; }
.empty-state-text { font-size: 14px; font-weight: 600; line-height: 1.6; }

/* ── Map view ── */
.map-screen { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; overflow: hidden; background: var(--bg); }
.map-canvas { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
.map-back-btn {
  position: absolute; top: 16px; left: 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px; font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-mid); cursor: pointer; transition: border-color 0.2s, color 0.2s;
  z-index: 10; display: flex; align-items: center; gap: 8px;
}
.map-back-btn:hover { border-color: var(--purple-light); color: var(--text); }
@keyframes mapZoomIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.map-zoom-in { animation: mapZoomIn 0.4s cubic-bezier(0.34,1.1,0.64,1) forwards; }
@keyframes nodeRadialIn { from { opacity:0; } to { opacity:1; } }
.domain-detail {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 640px; background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  z-index: 5; animation: detailSlideIn 0.25s cubic-bezier(0.34,1.28,0.64,1) forwards;
  max-height: calc(100vh - 160px); overflow-y: auto;
}
@keyframes detailSlideIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
}
@keyframes whyPanelIn {
  from { opacity: 0; transform: translate(-50%,-50%) scale(0.92); }
  to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
@keyframes actionFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.action-item { animation: actionFadeIn 0.2s ease-out forwards; }
.domain-detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.domain-colour-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.domain-detail-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
.action-list { margin-bottom: 20px; }
.action-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 8px; transition: border-color 0.2s;
}
.action-item:hover { border-color: var(--purple-light); box-shadow: inset 3px 0 0 var(--purple-light); }
.action-check {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.action-check.done { background: var(--teal); border-color: var(--teal); }
.action-text { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.4; }
.action-text.done { text-decoration: line-through; color: var(--text-dim); }
.action-freq { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); white-space: nowrap; }
.add-action-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
.add-action-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; font-family: 'Montserrat', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--text); outline: none; transition: border-color 0.2s;
}
.add-action-input:focus { border-color: var(--purple-light); }
.add-action-input::placeholder { color: var(--text-faint); font-weight: 500; }
.btn-add-small {
  background: var(--purple); color: white; border: none; border-radius: 10px;
  padding: 11px 16px; font-family: 'Montserrat', sans-serif; font-size: 11px;
  font-weight: 900; letter-spacing: 1px; cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
}
.btn-add-small:hover:not(:disabled) { opacity: 0.85; }
.btn-add-small:disabled { opacity: 0.3; cursor: not-allowed; }
.add-domain-panel {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; align-items: center; z-index: 10;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.add-domain-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-family: 'Montserrat', sans-serif; font-size: 13px;
  font-weight: 600; color: var(--text); outline: none; width: 200px; transition: border-color 0.2s;
}
.add-domain-input:focus { border-color: var(--purple-light); }
.add-domain-input::placeholder { color: var(--text-faint); font-weight: 500; }
.map-hint { position: absolute; top: 16px; right: 16px; font-size: 11px; color: var(--text-faint); font-weight: 600; letter-spacing: 0.5px; z-index: 10; }
</style>
</head>

// ── Helpers ──────────────────────────────────────────────────
async function hashEmail(email) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(email.toLowerCase().trim()));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,32);
}

function ls(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; } catch { return fallback; }
}

function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── Firebase loader — deferred until first use ────────────────
let firebaseDb = null;
function loadFirebaseScripts() {
  return new Promise((resolve, reject) => {
    if (firebaseDb) { resolve(); return; }
    let loaded = 0;
    function onLoad() {
      loaded++;
      if (loaded === 2) {
        try {
          const app = firebase.initializeApp(FIREBASE_CONFIG);
          firebaseDb = firebase.database(app);
          resolve();
        } catch(e) { reject(e); }
      }
    }
    const s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload = onLoad; s1.onerror = reject;
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    s2.onload = onLoad; s2.onerror = reject;
    document.head.appendChild(s1);
    document.head.appendChild(s2);
  });
}
</script>

// ── Auth0 OTP helpers ────────────────────────────────────────
async function requestOTP(email) {
  const res = await fetch(`https://${AUTH0_DOMAIN}/passwordless/start`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      client_id: AUTH0_CLIENT_ID,
      connection: 'email',
      email,
      send: 'code'
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error_description || 'Failed to send code'); }
  return true;
}

async function verifyOTP(email, otp) {
  const res = await fetch(`https://${AUTH0_DOMAIN}/oauth/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      grant_type: 'http://auth0.com/oauth/grant-type/passwordless/otp',
      client_id: AUTH0_CLIENT_ID,
      username: email,
      otp,
      realm: 'email',
      scope: 'openid email profile'
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || 'Invalid code');
  return data;
}

// ── Firebase sync ─────────────────────────────────────────────
async function loadFromFirebase(userPath) {
  await loadFirebaseScripts();
  const snap = await firebaseDb.ref(userPath + '/data').get();
  const cloudData = snap.exists() ? snap.val() : null;
  if (cloudData) {
    CLOUD_KEYS.forEach(k => {
      if (cloudData[k] !== undefined) localStorage.setItem(k, JSON.stringify(cloudData[k]));
    });
  }
  return cloudData;
}

async function saveToFirebase(userPath) {
  await loadFirebaseScripts();
  const payload = {};
  CLOUD_KEYS.forEach(k => {
    const raw = localStorage.getItem(k);
    if (raw !== null) { try { payload[k] = JSON.parse(raw); } catch(e) {} }
  });
  await firebaseDb.ref(userPath + '/data').set(payload);
}

// ── OTP Input component ───────────────────────────────────────
function OTPInput({ onComplete }) {
  const [vals, setVals] = useState(['','','','','','']);
  const refs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const handleChange = (i, v) => {
    const cleaned = v.replace(/\D/g,'').slice(-1);
    const next = [...vals];
    next[i] = cleaned;
    setVals(next);
    if (cleaned && i < 5) refs[i+1].current.focus();
    if (next.every(c => c !== '')) onComplete(next.join(''));
  };

  const handleKeyDown = (i, e) => {
    if (e.key === 'Backspace' && !vals[i] && i > 0) refs[i-1].current.focus();
  };

  const handlePaste = (e) => {
    const text = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    if (text.length === 6) {
      const next = text.split('');
      setVals(next);
      refs[5].current.focus();
      onComplete(text);
    }
    e.preventDefault();
  };

  return (
    <div className="otp-grid">
      {vals.map((v, i) => (
        <input
          key={i}
          ref={refs[i]}
          className="otp-cell"
          type="text"
          inputMode="numeric"
          maxLength={1}
          value={v}
          onChange={e => handleChange(i, e.target.value)}
          onKeyDown={e => handleKeyDown(i, e)}
          onPaste={handlePaste}
          autoFocus={i === 0}
        />
      ))}
    </div>
  );
}

// ── Confetti ──────────────────────────────────────────────────
function fireConfetti(duration = 2500) {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colours = ['#6B4FBB','#0BBFBF','#E8453C','#F0B429','#FFFFFF','#9B8FCC'];
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: Math.random() * 10 + 5,
    h: Math.random() * 5 + 3,
    colour: colours[Math.floor(Math.random() * colours.length)],
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random() - 0.5) * 3,
    vy: Math.random() * 3 + 2,
    vr: (Math.random() - 0.5) * 0.15
  }));
  const start = Date.now();
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const elapsed = Date.now() - start;
    if (elapsed > duration) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.colour;
      ctx.globalAlpha = Math.max(0, 1 - elapsed / duration);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}
